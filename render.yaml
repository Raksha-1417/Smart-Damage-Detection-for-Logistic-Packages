databases:
  - name: logivision-db
    databaseName: logivision
    user: logivision_admin
    plan: free

services:
  # ── Backend ───────────────────────────────────────────────────────────────
  - type: web
    name: logivision-backend
    env: docker
    dockerfilePath: ./Smart Damage Detection for Logistics Packages Using Computer Vision/backend/Dockerfile
    dockerContext: ./Smart Damage Detection for Logistics Packages Using Computer Vision/backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: POSTGRES_DSN
        fromDatabase:
          name: logivision-db
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: S3_BUCKET_NAME
        value: damage-detection-images-s3
      - key: AWS_REGION
        value: eu-north-1
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: CONF_THRESH
        value: 0.25
      - key: IMG_SZ
        value: 640

  # ── Frontend ──────────────────────────────────────────────────────────────
  - type: web
    name: logivision-frontend
    env: static
    buildCommand: cd "Smart Damage Detection for Logistics Packages Using Computer Vision/frontend/angular-app" && bash build.sh
    staticPublishPath: Smart Damage Detection for Logistics Packages Using Computer Vision/frontend/angular-app/dist/damage-detection-frontend/browser
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set to your backend URL after first deploy, e.g.:
      #   https://logivision-backend.onrender.com/api
      - key: API_URL
        sync: false
